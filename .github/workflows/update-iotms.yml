name: Update IOTMs

# Runs the IOTM scraper daily and opens (or updates) a single rolling PR with
# any new IOTMs and tier backfills. IOTMs ship monthly but on a variable day,
# so a daily cadence catches each release within ~24h of the wiki updating
# rather than guessing a date. The PR is the human-review gate — nothing
# reaches main without a merge.
# — claude 8043a506, 2026-05-30

on:
  schedule:
    # 14:17 UTC daily. Off-the-hour to dodge the scheduler's top-of-hour spike.
    - cron: "17 14 * * *"
  workflow_dispatch: {}

# Let one run supersede an in-flight one rather than stacking.
concurrency:
  group: update-iotms
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Use Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.23"

      - name: Install dependencies
        run: bun install

      # Guard: if the scraper's own tests are red, don't open a PR with output
      # we can't trust.
      - name: Test scraper
        run: bun test packages/wishlist-shared/scripts/update-iotms

      - name: Scrape and update iotms.ts
        run: |
          bun packages/wishlist-shared/scripts/update-iotms/update.ts \
            --report=iotm-report.md --title-out=iotm-title.txt

      - name: Format
        run: bunx prettier --write packages/wishlist-shared/data/iotms.ts

      # Generate themed PNGs for any newly-added IOTM images (incremental — only
      # fetches/processes images not already on disk) so a new entry ships with
      # its artwork in the same PR instead of rendering broken until a manual
      # run. No-ops when the scrape added nothing new.
      # — claude 06de4a57, 2026-06-02
      - name: Process new item images
        run: bun packages/wishlist-web/scripts/process-images.ts

      # Commit to a stable branch and open one rolling PR (or update the open
      # one), using only git + the runner's pre-installed gh CLI — no
      # third-party action. The branch is force-updated from the current main
      # each run, so it accrues changes until merged and starts fresh after.
      # — claude 8043a506, 2026-05-30
      - name: Open / update pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH=bot/iotm-update
          # Surfaces the update can touch: the data file, the themed PNGs the
          # image step (re)generates, and the animated-image manifest.
          PATHS=(
            packages/wishlist-shared/data/iotms.ts
            packages/wishlist-web/public/itemimages
            packages/wishlist-web/src/data/animatedImages.json
          )
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- "${PATHS[@]}"
          # If none of those staged, the scrape found nothing new — no PR.
          if git diff --cached --quiet; then
            echo "No data/image changes — nothing to do."
            exit 0
          fi
          TITLE=$(cat iotm-title.txt)
          git checkout -B "$BRANCH"
          git commit -m "data: update IOTMs (new entries + tier backfill)"
          git push --force origin "$BRANCH"
          # Reuse the open PR if one exists; otherwise open it. Either way,
          # refresh the title + body so the rolling PR reflects the latest run
          # (a branch push alone updates neither).
          NUM=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[].number')
          if [ -z "$NUM" ]; then
            gh pr create --base main --head "$BRANCH" \
              --title "$TITLE" --body-file iotm-report.md
          else
            gh pr edit "$NUM" --title "$TITLE" --body-file iotm-report.md
          fi

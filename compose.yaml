# Deployed via Coolify (Docker Compose resource). Coolify's Traefik proxy
# handles TLS termination and routing via the labels below.
#
# Routing:
#   kol.resprit.com/*     -> web:3000
#   kol.resprit.com/api/* -> web:3000  (web reverse-proxies to api:3001)
#
# The web container owns the /api/* proxy now (server.ts), so Traefik only
# needs one route per service. Local dev mirrors this via vite's server.proxy.

services:
  web:
    image: ghcr.io/${GITHUB_OWNER}/pocket-wishlist:${IMAGE_TAG:-latest}
    # Coolify's GET /api/v1/deploy?force=true recreates containers without
    # running `docker compose pull` first (coollabsio/coolify#5318), so a
    # tag-push that bumps :latest leaves the VPS running the cached image.
    # `pull_policy: always` makes docker compose re-pull on every recreate,
    # which is what we want for our :latest-rolling deploy.
    pull_policy: always
    environment:
      PORT: "3000"
      # Host of the api container; the web server reverse-proxies /api/*
      # here and the bootstrap fetcher pulls initial data from it.
      API_BASE_INTERNAL: http://api:3001
    depends_on:
      - api
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https
      - traefik.http.routers.pocket-wishlist-web-http.entryPoints=http
      - traefik.http.routers.pocket-wishlist-web-http.rule=Host(`kol.resprit.com`)
      - traefik.http.routers.pocket-wishlist-web-http.middlewares=redirect-to-https
      - traefik.http.routers.pocket-wishlist-web-http.priority=1
      - traefik.http.routers.pocket-wishlist-web.entryPoints=https
      - traefik.http.routers.pocket-wishlist-web.rule=Host(`kol.resprit.com`)
      - traefik.http.routers.pocket-wishlist-web.tls=true
      - traefik.http.routers.pocket-wishlist-web.tls.certresolver=letsencrypt
      - traefik.http.routers.pocket-wishlist-web.priority=1
      - traefik.http.services.pocket-wishlist-web.loadbalancer.server.port=3000
      - traefik.http.services.pocket-wishlist-web.loadbalancer.healthcheck.path=/health
      - traefik.http.services.pocket-wishlist-web.loadbalancer.healthcheck.interval=30s
      - traefik.http.services.pocket-wishlist-web.loadbalancer.healthcheck.timeout=5s

  api:
    image: ghcr.io/${GITHUB_OWNER}/pocket-wishlist-api:${IMAGE_TAG:-latest}
    # See pull_policy note on the `web` service.
    pull_policy: always
    environment:
      SECRET: ${SECRET}
      DB_PATH: /data/wishlist.db
      PORT: "3001"
      # KoL credentials for the lowest-mall scrape job (daily cron +
      # POST /refresh-prices). Cron disables itself when these are unset.
      KOL_USERNAME: ${KOL_USERNAME:-}
      KOL_PASSWORD: ${KOL_PASSWORD:-}
      # Hour-of-day (UTC) for the daily refresh. Default 8.
      REFRESH_HOUR_UTC: ${REFRESH_HOUR_UTC:-8}
    volumes:
      - api_data:/data
    restart: unless-stopped
    # No Traefik router: the api is reachable only via web's /api/* reverse
    # proxy on the docker network. Public ingress is web-only.

volumes:
  api_data:

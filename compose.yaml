# Local full-stack run: `docker compose -f compose.yaml -f compose.dev.yaml
# up --build` brings web + api up from this checkout (see compose.dev.yaml).
# The browser hits web on :3000 and web reverse-proxies /api/* to api:3001;
# only web is exposed.
#
# This file does NOT define the production deploy. On the VPS, web and api are
# two standalone Coolify "Docker Image" apps that pull the ghcr images below.
# Coolify owns TLS, Traefik routing, and the web-only public ingress, and
# injects env per app — notably API_BASE_INTERNAL, which in prod points at the
# api app's Coolify network alias `pocket-wishlist:3001`, not the compose
# service name `api` used here.

services:
  web:
    image: ghcr.io/${GITHUB_OWNER}/pocket-wishlist:${IMAGE_TAG:-latest}
    environment:
      PORT: "3000"
      # web reverse-proxies /api/* here and the bootstrap fetcher pulls the
      # initial data from it. In this local stack that's the `api` service
      # below; prod overrides it to the api app's `pocket-wishlist` alias.
      API_BASE_INTERNAL: http://api:3001
    depends_on:
      - api
    restart: unless-stopped

  api:
    image: ghcr.io/${GITHUB_OWNER}/pocket-wishlist-api:${IMAGE_TAG:-latest}
    environment:
      SECRET: ${SECRET}
      DB_PATH: /data/wishlist.db
      PORT: "3001"
      # KoL credentials for the lowest-mall scrape job (daily cron +
      # POST /api/refresh-prices). Cron disables itself when these are unset.
      KOL_USERNAME: ${KOL_USERNAME:-}
      KOL_PASSWORD: ${KOL_PASSWORD:-}
      # Hour-of-day (UTC) for the daily refresh. Default 8.
      REFRESH_HOUR_UTC: ${REFRESH_HOUR_UTC:-8}
    volumes:
      - api_data:/data
    restart: unless-stopped
    # Not exposed; reachable only via web's /api/* proxy over the compose
    # network.

volumes:
  api_data:
